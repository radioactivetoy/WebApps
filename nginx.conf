server {
    listen 80;
    absolute_redirect off;

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location /circle-of-fifths/ {
        alias /usr/share/nginx/html/circle-of-fifths/;
        try_files $uri $uri/ /circle-of-fifths/index.html;
    }

    # Template for each new app:
    # location /my-new-app/ {
    #     alias /usr/share/nginx/html/my-new-app/;
    #     try_files $uri $uri/ /my-new-app/index.html;
    # }
}
